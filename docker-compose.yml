services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: outbox
      POSTGRES_USER: outbox
      POSTGRES_PASSWORD: outbox
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbox -d outbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: "postgresql://outbox:outbox@postgres:5432/outbox?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 10
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      - kafka
    network_mode: "service:kafka"
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka..."
        for i in $$(seq 1 30); do
          if /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 \
          --create --if-not-exists \
          --topic orders.events \
          --partitions 10 \
          --replication-factor 1
        echo "Topic orders.events is ready (10 partitions)"

  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:12.3.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_RENDERING_SERVER_URL: http://grafana-image-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
      - grafana-image-renderer

  grafana-image-renderer:
    image: grafana/grafana-image-renderer:3.12.2
    ports:
      - "8082:8081"

  tempo:
    image: grafana/tempo:2.8.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro

  opensearch:
    image: opensearchproject/opensearch:2.19.2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.2
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      - opensearch

  opensearch-init:
    image: curlimages/curl:8.12.1
    restart: "no"
    volumes:
      - ./monitoring/opensearch/index-template.json:/index-template.json:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://opensearch:9200 >/dev/null; do sleep 2; done
        curl -sf -X PUT http://opensearch:9200/_index_template/spring-outbox-logs \
          -H "Content-Type: application/json" \
          -d @/index-template.json
        echo opensearch index template applied
    depends_on:
      opensearch:
        condition: service_started

  opensearch-dashboards-init:
    image: curlimages/curl:8.12.1
    restart: "no"
    volumes:
      - ./monitoring/opensearch-dashboards/saved-objects.ndjson:/saved-objects.ndjson:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://opensearch-dashboards:5601/api/status >/dev/null; do sleep 3; done
        sleep 5
        curl -sf -X POST "http://opensearch-dashboards:5601/api/saved_objects/_import?overwrite=true" \
          -H "osd-xsrf: true" \
          -F file=@/saved-objects.ndjson
        echo opensearch dashboards saved objects imported
    depends_on:
      opensearch-dashboards:
        condition: service_started

  fluent-bit:
    image: fluent/fluent-bit:3.2.10
    volumes:
      - ./logs/order-service:/var/log/app/order-service/order-service:ro
      - ./logs/notification-stub:/var/log/app/notification-stub/notification-stub:ro
      - ./logs/order-service-reactive:/var/log/app/order-service-reactive/order-service-reactive:ro
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./monitoring/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      - opensearch

volumes:
  opensearch-data:
