[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/app/order-service/order-service/app.json,/var/log/app/notification-stub/notification-stub/app.json,/var/log/app/order-service-reactive/order-service-reactive/app.json
    Parser            json
    Tag               spring.outbox
    Refresh_Interval  5
    Read_from_Head    On
    Skip_Long_Lines   On

[FILTER]
    Name    modify
    Match   spring.outbox
    Add     log_source fluent-bit

[OUTPUT]
    Name               opensearch
    Match              spring.outbox
    Host               opensearch
    Port               9200
    Logstash_Format    On
    Logstash_Prefix    spring-outbox-logs-local
    Suppress_Type_Name On
    tls                Off
    Retry_Limit        False
