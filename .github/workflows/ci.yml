name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Verify Docker is available
        run: docker info

      - name: Build and test
        run: |
          mvn -B clean verify || {
            echo "=== Failsafe failures ==="
            find . -path '*/failsafe-reports/*.txt' -print -exec cat {} \;
            exit 1
          }

      - name: Gatling smoke (start infra)
        run: |
          docker compose up -d postgres kafka
          docker compose ps

      - name: Gatling smoke (start order-service)
        run: |
          # order-service is already packaged by "mvn clean verify" above.
          # Run the jar directly to avoid spring-boot:run hitting the root pom (no mainClass).
          java -jar order-service/target/order-service-*.jar --spring.profiles.active=dev &
          echo $! > order-service.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8080/actuator/health >/dev/null; then
              echo "order-service is up"
              exit 0
            fi
            sleep 2
          done
          echo "order-service did not become healthy in time"
          exit 1

      - name: Gatling smoke (run)
        run: |
          mvn -B -pl load-tests gatling:test \
            -Dgatling.simulationClass=com.kholodilin.outbox.loadtests.CreateOrderSimulation \
            -DbaseUrl=http://localhost:8080 \
            -DstageDurationSeconds=15 -DrampSeconds=5 \
            -Drps1=10 -Drps2=10 -Drps3=10

      - name: Gatling smoke (stop order-service)
        if: always()
        run: |
          if [ -f order-service.pid ]; then
            kill "$(cat order-service.pid)" || true
          fi
          docker compose down -v || true

      - name: Upload Gatling reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-reports
          path: "load-tests/target/gatling/"

      - name: Upload failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: "**/failsafe-reports/"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            outbox-events-contract/target/site/jacoco/jacoco.xml,
            order-service/target/site/jacoco/jacoco.xml,
            notification-stub/target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
